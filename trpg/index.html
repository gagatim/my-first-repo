<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冒險者傳說 - 網頁 TRPG</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <section id="screen-create" class="screen">
      <h1>⚔️ 建立你的角色</h1>
      <input id="name-input" placeholder="輸入角色名稱" maxlength="8">
      <div id="class-options" class="class-options"></div>
      <button id="create-btn" disabled>開始冒險</button>
    </section>

    <section id="screen-menu" class="screen hidden">
      <div class="char-card">
        <div class="char-emoji" id="menu-emoji"></div>
        <div class="char-info">
          <h2 id="menu-name"></h2>
          <p class="muted" id="menu-class"></p>
          <div class="stat-row">
            <span>HP</span>
            <div class="bar"><div id="menu-hp-bar" class="bar-fill hp"></div></div>
            <span id="menu-hp-text"></span>
          </div>
          <div class="stat-row">
            <span>MP</span>
            <div class="bar"><div id="menu-mp-bar" class="bar-fill mp"></div></div>
            <span id="menu-mp-text"></span>
          </div>
          <div class="stat-row">
            <span>EXP</span>
            <div class="bar"><div id="menu-exp-bar" class="bar-fill exp"></div></div>
            <span id="menu-exp-text"></span>
          </div>
          <div class="stat-grid" id="menu-stats"></div>
          <p id="menu-gold-text"></p>
        </div>
      </div>
      <div class="menu-actions">
        <button id="stage-select-btn">🗺️ 選擇挑戰</button>
        <button id="shop-btn">🏪 商店</button>
        <button id="inventory-btn">🎒 裝備背包</button>
        <button id="skills-btn">📖 查看技能</button>
        <button id="ascend-btn" class="hidden accent">✨ 轉升</button>
        <button id="reset-btn" class="danger">🗑️ 重置角色</button>
      </div>
      <div id="skills-panel" class="panel hidden"></div>
    </section>

    <section id="screen-stage-select" class="screen hidden">
      <h1>🗺️ 選擇挑戰</h1>
      <div id="stage-list" class="stage-list"></div>
      <button id="stage-back-btn">◀ 返回</button>
    </section>

    <section id="screen-shop" class="screen hidden">
      <h1>🏪 商店</h1>
      <p id="shop-gold-text" class="muted"></p>
      <div class="shop-tabs" id="shop-tabs">
        <button data-tab="weapon">武器</button>
        <button data-tab="armor">防具</button>
        <button data-tab="potion">藥水</button>
        <button data-tab="material">材料</button>
        <button data-tab="statboost">藥劑</button>
        <button data-tab="skill">技能</button>
        <button data-tab="bundle">禮包</button>
      </div>
      <div id="shop-list" class="shop-list"></div>
      <button id="shop-back-btn">◀ 返回</button>
    </section>

    <section id="screen-inventory" class="screen hidden">
      <h1>🎒 裝備背包</h1>
      <div class="panel">
        <h3>已裝備</h3>
        <div id="equipped-weapon" class="equip-row"></div>
        <div id="equipped-armor" class="equip-row"></div>
      </div>
      <div id="enhance-panel" class="panel hidden"></div>
      <div class="panel">
        <h3>持有武器</h3>
        <div id="owned-weapons"></div>
      </div>
      <div class="panel">
        <h3>持有防具</h3>
        <div id="owned-armors"></div>
      </div>
      <div class="panel">
        <h3>藥水 / 材料</h3>
        <div id="owned-consumables"></div>
      </div>
      <button id="inventory-back-btn">◀ 返回</button>
    </section>

    <section id="screen-dialogue" class="screen hidden">
      <div class="dialogue-box">
        <p class="dialogue-speaker" id="dialogue-speaker"></p>
        <p class="dialogue-text" id="dialogue-text"></p>
        <button id="dialogue-next">繼續 ▶</button>
      </div>
    </section>

    <section id="screen-battle" class="screen hidden">
      <div class="battle-field">
        <div class="combatant">
          <div class="combatant-emoji" id="battle-player-emoji"></div>
          <div class="combatant-name" id="battle-player-name"></div>
          <div class="bar small"><div id="battle-player-hp" class="bar-fill hp"></div></div>
          <div class="bar small"><div id="battle-player-mp" class="bar-fill mp"></div></div>
        </div>
        <div class="vs">VS</div>
        <div class="combatant">
          <div class="combatant-emoji" id="battle-monster-emoji"></div>
          <div class="combatant-name" id="battle-monster-name"></div>
          <div class="bar small"><div id="battle-monster-hp" class="bar-fill hp"></div></div>
        </div>
      </div>
      <div class="battle-log" id="battle-log"></div>
      <div class="battle-actions" id="battle-actions">
        <button id="attack-btn">⚔️ 攻擊</button>
        <button id="skill-menu-btn">✨ 技能</button>
        <button id="potion-menu-btn">🧪 藥水</button>
        <button id="flee-btn">🏃 逃跑</button>
      </div>
      <div class="battle-skill-list hidden" id="battle-skill-list"></div>
      <div class="battle-skill-list hidden" id="battle-potion-list"></div>
      <button id="battle-continue-btn" class="hidden accent">繼續 ▶</button>
    </section>
  </div>

  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
